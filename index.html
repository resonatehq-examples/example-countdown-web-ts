<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen">
  <div class="container mx-auto px-4 py-12">
    <div class="max-w-xl mx-auto">
      <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
        <div class="px-8 py-6" style="background-color: #353F58;">
          <h1 class="text-3xl font-bold text-white">Countdown Timer</h1>
          <p class="text-white mt-1 text-sm" style="opacity: 0.8;">Powered by Resonate</p>
        </div>

        <div class="p-8">
          <div class="rounded-lg p-4 border border-gray-200" style="background-color: rgba(53, 63, 88, 0.03);">
            <label class="block text-xs font-semibold uppercase tracking-wide mb-2" style="color: #353F58; opacity: 0.7;">
              Invoke the Countdown
            </label>
            <p class="text-sm mb-3" style="color: #353F58;">
              Run the following command to start a countdown from 5, once a minute:
            </p>
            <pre class="bg-gray-900 text-gray-100 p-4 rounded-lg text-sm overflow-x-auto"><code>resonate invoke countdown.1 --func countdown --arg 5 --arg 1</code></pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/index.ts"></script>
</body>
</html>
